body:
  text: 題北山酒經後大隱先生朱翼中壯年勇退著書釀酒僑居西湖上而老焉屬朝廷大興醫藥求深於道術者爲之官師乃起公爲博士與余爲同寮明年翼中坐書東坡詩貶達州又明年以宫祠還未至余一夕夢翼中相過且論詩云投老南還愧轉蓬㑹令淨土變炎風由来祗許杯中物萬事從渠醉眼中明日理書帙得翼中北山酒經發而讀之葢有禦魑魅於烟嵐轉炎荒爲淨土之語與夢頗契余甚異乃作此詩以志之他時見翼中當以是問之其果夣乎非耶政和七年正月二十五也赤子含德天所鈞日漸月化滋澆淳惟帝哀矜憐下民爲作醪醴發其眞炊香釀玉爲物春薫然剛愎皆慈仁陶冶窮愁孰知貧誦德不獨有伯倫先生作經聖賢分獨醒正似非余身德全不許世人聞夣中作詩語罕親不願萬户誤國恩乞取醉鄉作封君朝奉郎行開封府刑曹椽李保跋
