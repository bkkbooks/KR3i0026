body:
  text: 北山酒經卷下宋朱翼中撰卧漿今人都不復用酒絶忌酸乃以酸漿湯米何也又以水與薑蔥解之􅀹為不韻六月三伏時用小麥一斗煑粥為脚日間懸胎蓋夜間實蓋之逐日浸熱麵漿或飲湯不妨給用但不得犯生水造酒最在漿其漿不可才酸便用須是味重酴米偷酸全生於漿大法漿不酸即不可醞酒葢造酒以漿為祖無漿處或以水解醋入蔥椒等煎謂之合新漿如用已曽浸米漿以水解之入蔥椒等煎謂之傳舊漿今人呼為酒漿是也酒漿多漿臭而無香辣之味以此知須是六月三伏時造下漿免用酒漿也酒漿寒凉時猶可用温熱時即須用臥漿寒時如臥漿缺絶不得已亦須且合新漿用也淘米造酒治糯為先須令揀擇不可有粳米若旋揀實為費力要須自種糯榖即全無粳米免更㨂擇古人種秫蓋為此凡米不從淘中取淨從揀中取淨縁水秪去得塵土不能去砂石䑕糞之類要須旋舂簸令潔白走水一淘大忌乆浸今人不用漿最要淘淨亦忌乆浸乆浸則米心未必即透反致難蒸蓋揀簸即淨則淘數少而漿入但先傾米入籮約度添水用把子靠定籮唇取力直下不住手急打幹使水米運轉自然勻淨才水清即住如此則米已潔凈亦無陳氣仍須隔宿淘控方始可用葢控得極乾即漿入而易酸此為大法煎漿假令米一石用卧漿水一石五斗卧漿者夏月所造酸漿也非用已曽浸米酒漿也仍必須仔細刷洗鍋竈三四遍先煎三四沸以笊籬漉去白沫更􅇋一兩沸然後入蔥一大握祠祭以􅀈代蔥椒一兩油二兩麵一盞以漿半碗調麵打成薄水同煎六七沸煎時不住手攪不攪則偏沸及有􅘤着處蔥熟即便漉去蔥椒等如漿酸亦須約分數以水解之漿味淡即更入釅醋要之湯米漿以酸美為十分若用九分味酸者則每漿九斗入水一斗解之餘倣此寒時用九分至八分温凉時用六分至七分熱時用五分至四分大凡漿要四時改破冬漿濃而涎春漿清而涎夏不用若涎秋漿如春漿造酒看漿是大事古諺云看米不如看麴看麴不如看酒看酒不如看漿湯米一石甕埋入地一尺先用湯湯甕然後拗漿逐旋入甕不可一併入生甕恐損甕器便用棹箆攪出火氣然後下米米新即倒湯米陳即正湯湯字去聲切倒湯者坐漿湯米也正湯者先傾米在甕内傾漿入也其湯須接續傾入不住手攪湯大熱則米爛成塊湯慢即湯去聲不倒而米澁但漿酸而米淡寧可熱不可冷冷即湯米不酸兼無涎生亦須看時􅇋及米性新陳春間用挿手湯夏間用宜似熱湯秋間即魚眼湯比挿手差熱冬間須用沸湯若冬月却用温湯則漿水力慢不能發脱夏月若用熱湯則漿水力𦂳湯損亦不能發缺時漿不溫熱得所湯米時逐旋缺續入甕急令二人用棹箆連底抹起三五百下米滑及顔色光粲乃止如米未滑於合用湯數外更加湯數斗湯之不妨秪以米滑為度須是連底攪轉不得停手若攪少非特湯米不滑兼上面一重米湯破下面米湯不勻有如爛粥相似直候米滑漿温即住手以席薦圍蓋之令有煖氣不令透氣夏月亦蓋但不須厚爾如早辰湯米晩間又攪一遍晩間湯米来早又復再攪每攪不下一二百轉次日再入湯又攪謂之接湯接湯後漸漸發起泡末如魚眼蝦跳之類大約三日後必醋矣尋常湯米後第二日生漿泡如水上浮漚第三日生漿衣寒時如餅煖時稍薄第四日便嘗若已酸美有涎即先以笊籬掉去漿面以手連底攪轉恐有結米蒸時成塊氣難透也夏月秪隔宿可用春間雨日冬間三宿要之須候漿如牛涎米心酸用手一撚便碎巴人蒸米先以大器盛沸湯俟蒸米熟即從甑傾入沸湯中應時米透一撚便碎何事煩瑣乃爾然後漉出亦不可拘日數也惟夏月漿米熱後經四五宿漸漸淡薄謂之倒了葢夏月熱後發過罨損况漿味自有死活若漿面有花衣浡白色明快涎黏米粒圓明鬆利嚼着味酸甕内温煖乃是漿活若無花沫漿碧色不明快米嚼碎不酸或有氣息甕内冷乃是漿死蓋是湯時不活絡善知此者嘗米不嘗漿不知此者嘗漿不嘗米大抵米酸則無事於漿漿死却須用杓盡撆出元漿入鍋重煎再湯𦂳慢比前来減三分謂之接漿依前蓋了當宿即醋或秪撆出元漿不用漉出米以新水衝過出却惡氣上甑炊時别煎好酸漿潑饙下脚亦得要之不若接漿為愈然亦在看天氣寒温隨時體當蒸醋麋欲蒸麋隔日漉出漿依出米置淋甕滴盡水脉以手試之入手散􅉡􅉡地便堪蒸若濕時即有結麋先取合使潑麋漿以水解依四時定分數依前入蔥椒等同煎用箆不住攪令勻沸若不攪則有偏沸及煉竈釡處多致鐡腥漿香熟别用盆甕内放冷下脚使用一面添水燒竈安甑萆勿令偏側若刷釡不淨置萆偏反或破損并氣未上便装篩漏下生米及竈内湯太滿可八分滿則多致湯溢出衝萆氣直上突酒人謂之甑達則麋有生熟不勻則傾少生油入釡其沸自止須候釡沸氣上將控乾酸麋逐旋以杓輕手續續趂氣撒裝勿令壓實一石米約作三次裝一層氣透又上一層每一次上米用炊箒掠撥周回上下生米在氣出處直候氣勻無坐米掠撥不動更看氣𦂳慢不勻處用米杴子撥開慢處壅在𦂳處謂之撥澑若萆子周遭氣小須從外撥来向上如􅌯背相似時復用氣杖子試之劄處若實即是氣流劄處若虚必有生米卽用杖子翻起撥勻候氣圓用木拍或蓆蓋之更􅇋火氣上以手拍之如不黏手權住火即用杴子攪幹盤摺將煎下冷漿二斗隨棹西撥每一石米湯用冷漿二斗如要醇濃即少用水饙酒自然稠厚更用棹箆拍擊令米心勻破成麋緣漿米既已浸透又更蒸熟所以棹箆拍着便見皮折心破裏外皅爛成麋再用木拍或蓆葢之微畱少火泣定水脉即以餘漿洗案令潔淨出麋出案上攤開令冷翻稍一兩遍脚麋若炊得稀薄如粥即造酒尤醇捜拌入麴時却縮水勝如旋入别水也四時並同洗案刷甕之類並用熟漿不得入生水用麴古法先浸麴發如魚眼湯淨淘米炊作飯令極冷以絹袋濾去麴滓取麴汁於甕中即酘飯近世不然炊飯冷同麴捜拌入甕麴有陳新陳麴力𦂳每斗米用十兩新麴十二兩或十三兩臘脚酒用麴宜重大抵麴力勝則可存畱寒暑不能侵米石百兩是為氣平十之上則苦十之下則甘要在隨人所嗜而増損之凡用麴日曝夜露齊民要術夜乃不收令受霜露須看風隂恐雨潤故也若急用則麴乾亦可不必露也受霜露二十日許彌令香酒麴須極乾若潤濕則酒惡矣新麴未經百日心未乾者須劈破􅀈焙未得便搗須於隔宿若不隔宿謂先一日焙過待火氣去乃用之則造酒定有炕麴氣大約每斗用麴八兩須用小麴一兩易發無失善用小麴雖煑酒亦色白今之玉女麴用二桑葉者是也酒要辣更於酘飯中入麴放冷下此要訣也張進造供御法酒使兩色麴每糯米一石用杏仁罨麴六十兩香桂罨麴四十兩一法醖酒罨麴風麴各半亦良法也四時麴麤細不同春冬醖造日多即搗作小塊子如骰子或皁子大則發斷有力而味醇釅秋夏醖造日淺則差細欲其麴米早相見而就熟要之麴細則味甜美麴麤則硬辣若麤細不勻則發得不齊酒味不定大抵寒時化遲不妨宜用麤麴暖時麴欲得疾發宜用細末雖然酒人亦不執或醅𦂳恐酒味太辣則添入米一二斗若發太慢恐酒甜即添麴二四斤定酒味全此時亦無固必也供銜祠祭用麴並在酴米内盡用之酘飯更不入麴一法將一半麴於酘飯内分使氣味芳烈却須並為細末也惟羔兒酒盡於脚飯内着麴不可不知也合酵北人造酒不用酵然冬月天寒酒難得發多攧了所以要取醅面正發醅為酵最妙其法用酒甕正發醅撆取面上浮米糝控乾用麴末拌令濕勻透風隂乾謂之乾酵今北人用引酵是此意凡造酒時於漿米中先取一升已来用本漿煑成粥放冷冬月微温用乾酵一合麴末一斤攪拌令勻放暖處􅇋次日捜飯時入釀飯甕中同拌大約申時欲捜飯須早辰先發下酵直候酵来多時發過方可用蓋酵纔来未有力也酵肥為来酵塌可用又况用酵四時不同須是體襯天氣天寒用湯發天熱用水發不在用酵多少也不然祗取正發酒醅二三杓拌和尤㨗酒人謂之傳醅色用酵也酴米酴米酒母也人謂之脚飯蒸米成麋策在案上頻頻翻不可令上乾而下濕大要在體襯天氣温凉時放微冷熱時令極冷寒時如人體金波法一石麋用麥糵四兩炒令冷麥糵咬盡米粒酒乃醇醲糝在麋上然後入麴酵一處古人兼用麴糵但期米爛耳衆手揉之務令麴與麋勻若麋稠硬即旋入少冷漿同揉亦在隨時相度大率捜麋秪要拌得麴與麋勻足矣亦不須捜如糕麋京醖京師醖捜得不見麴飯所以大甜麴不須極細麴細則甜美麴麤則硬辣麤細不等則發得不齊酒味不定大抵寒時化遲不妨宜用麤麴可投小塊子大暖時宜用細末欲得疾發大約每一斗米使大麴八兩小麴一兩易發無失並於脚飯内下之不得旋入生麴雖三酘酒亦盡於脚飯中下計算斤兩捜拌麴麋勻即搬入甕甕底先糝麴末更留四五兩麴蓋面漿麋逐段排挅用手𦂳按甕邉四畔拍令實中心剜作坑子入刷案上麴水三升或五升以来微温入在坑中并潑在醅面上以為信水大凡醖造須是五更初下手不令見日此過度法也下時東方未明要了若太陽出即酒多不中以伏時歇開甕如滲信水不盡便添薦蓆圍裹之頻頻楷汗三日後用手捺破頭尾𦂳即連底撥攪令勻若更𦂳即便摘開分減入别甕貴不發過一面炊甜米便酘不可隔宿恐發過無力酒人謂之摘脚脚𦂳多由麋熟大約兩三日後必動如信水糝盡醅面當心力起有裂紋多者十餘條少者五七條即是發𦂳須便分減大抵冬月醅脚厚不妨夏月醅脚要薄如信水未乾醅面不裂即是發慢須更添蓆圍裹􅇋一二日如尚未發每醅一石用杓取出二斗以来入熱蒸麋一斗在内却傾取出者醅在上面蓋之以手按平􅇋一二日發動據後来所入熱麋計合用麴入甕一處拌勻更􅇋發𦂳掩捺謂之按醅若下脚後依前發慢即用熱湯湯臂膊入甕攪撥令冷熱勻停須頻蘸臂膊貴要接助熱氣一二升小瓶貯熱湯密封口置在甕底候發則急去之謂之追魂或倒出在案上與熱甜麋拌再入甕厚蓋合且候隔兩夜方始攪撥依前𦂳蓋合一依投抹次第體當漸成醅謂之撘引或秪入正發醅脚一斗許在甕當心却撥慢醅蓋合次日發起攪撥亦謂之撘引造酒要脚正大忌發慢求以多方救助冬月置甕在温暖處用薦圍裹之入麥􅂒黍穰之類凉時去之夏月置甕在深屋底不透日氣處天氣極熱日間不得掀開用磚鼎定閣起恐地氣此為大法蒸甜麋不經酸漿浸故曰甜麋凡蒸酘麋先用新汲水浸破米心淨淘令水脉微透庶蒸時易軟脚米走水淘恐水透漿不入難得酸酘飯不湯故欲浸透也然後控乾候甑氣捜拌令勻入甕却以舊醅葢之緣有一半舊醅在甕夏月却醅須盡取出案上捜拌務要出却脚麋中酸氣一法脚𦂳案上捜脚慢甕中捜亦佳寒時用薦蓋温熱時用蓆若天氣大熱發慢秪用布罩之逐日用手連底掩拌務要甕邊冷醅来中心寒時以湯洗手臂助暖氣熱時秪用木把攪之不拘四時頻用托布抹汗五日以後更不須攪掩也如米粒消化而沸未止麴力大更酘為佳齊民要術初下用米一石次酘五斗又四斗又三斗以漸待来消即酘無令勢不相及味足沸定為熟氣味雖正沸未息者麴勢未盡宜更酘之不酘則酒苦薄矣第四第五六酘用米多少皆候麴勢强弱加減之亦無定法惟須米粒消化及酘之要在善候麴勢麴勢未窮米粒已消多酘為良世人云米過酒甜此乃不解體候耳酒冷沸止米有不消化者便是麴力盡也若沸止醅塌即便封泥起不令透氣夏月十餘日冬深四十日春秋二十三四日可上糟大抵要體當天氣冷暖與南北氣候即知酒熟有早晩亦不可拘定日數酒人看醅生熟以手試之若撥動有聲即是未熟若醅面乾如蜂窠眼子撥撲有酒湧起即是熟也供御祠祭十月造酘後二十日熟十一月造酘後一月熟十二月造酘後五十日熟酒器東南多􅀢甕洗刷淨便可用西北無之多用瓦甕若新甕用灰火七斤罩甕其上候通熱以油蠟徧塗之若舊甕冬初用時時須薰過其法用半頭磚鐺脚安放合甕塼上用乾黍穰文武火薰於甑釡上蒸以甕邊黒汁出為度然後水洗三五遍􅇋乾用之更用漆之尤佳上糟造酒寒時須是過熟即酒清數多渾頭白酵少溫凉時并熱時須是合熟便壓恐酒醅過熟又糟内易熱多致酸變大約造酒自下脚至熟寒時二十四五日温凉時半月熱時七八日便可上糟仍須勻裝停鋪手安壓板正下砧簞所貴壓得勻乾并無煎失轉酒入甕須垂手傾下免見濯損酒味寒時用草薦麥􅂒圍蓋温凉時去了以單布蓋之候三五日澄折清酒入瓶收酒上榨以器就滴恐滴逺損酒或以小杖子引下亦可壓下酒須先湯洗瓶器令淨控乾二三日一次折澄去盡脚纔有白絲即渾直候澄折得清為度即酒味倍佳便用蠟紙封閉務在滿裝瓶不在大以物閣起恐地氣發動酒脚失酒味仍不許頻頻抵動大抵酒澄得清更滿裝雖不煑夏月亦可存留内酒庫水酒夏月不煑秪是過熟上榨澄清收煑酒凡煑酒每斗入蠟二錢竹葉五片官局天南星九粒化入酒中如法封繫置在甑中第二次煑酒不用前来湯别須用冷水下然後發火候甑簞上酒香透酒溢出倒流便掲取甑蓋取一瓶開看酒滚即熟矣便住火良乆方取下置放石灰中不得頻移薰白酒須潑得清然後煑煑時瓶用桑葉冥之金波兼使白酒麴纔榨下糟略澄折二三日便蒸雖煑酒白色火迫酒取清酒三五日後據酒多少取甕一口先凈刷洗訖以火烘乾於底旁鑽一竅子如筯粗細以柳屑子塞定將酒入在甕入黄蠟半斤甕口以油單紙蓋繫定别泥一間淨室不得令通風門子可纔入得甕置甕在當中間以磚五重襯甕底於當門裏着炭三秤籠令實於中心着半斤許熟火便用閉門門外更懸蓆簾七日後方開又七日方取喫取時以細竹子一茶頭邊夾少新綿款款抽屑子以器承之以綿竹子遍於甕底攪纏盡着底濁物清即休纏仍塞了先鑽竅子圖取澱濁易耳每取時却入一竹筒子如銅淋子旋取之即耐停不損全勝於煑酒也曝酒法平旦起先煎下甘水三四升放冷着盆中日西將衠正純糯一斗用水淨淘至水清浸良乆方漉出瀝令米乾炊再􅀈飯約四更飯熟即卸在案棹上薄攤令極冷每旦日未出前用冷湯二碗拌飯令飯粒散不成塊每斗用藥二兩玉友白醪小酒眞一麴同秪槌碎為小塊并末子用手糝拌入飯中令粒粒有麴即逐段拍在甕四畔不須令太實惟中間開一井子直見底却以麴末糝醅面即以濕布蓋之如布乾又漬潤之常令布濕乃其訣也又不可令布大濕恐滴水入候漿来井中滿時時酌澆四邊直候漿来極多方用水一盞調大酒麴一兩投井漿中然後用竹刀界醅作六七片擘碎翻轉醅面上有白衣宜去之即下新汲水二碗依前濕布罨之更不得動少時自然結面醅在上漿在下即别淘糯米以先下脚米算數天凉對天熱半酘隔夜浸破米心次日晩夕炊飯放冷至夜酘之再入藥二两取甕中漿来拌勻捺在甕底以舊醅蓋之次日即大發候酘飯消化沸止方熟乃用竹篘篘之若酒面帶酸篘時先以手掠去酸面然後以竹篘挿入缺中心取酒其酒甕用木架起須要置凉處仍畏濕地此法夏中可作稍寒不成白羊酒臘月取絶肥嫩羯羊肉三十斤肉三十斤内要肥膘十斤連骨使水六斗已来入鍋煑肉令息軟漉出骨將肉絲擘碎畱着肉汁炊蒸酒飯時酌撒脂肉於飯上蒸令軟依常拌攪使盡肉汁六斗潑饙了再蒸良乆缷案上攤令温冷得所揀好脚醅依前法酘拌更使肉汁二升以来收拾案上及元壓面水依尋常大酒法日數但麴盡於酴米中用爾一法脚醅發秪於酘飯内方煑肉取脚醅一處捜拌入甕地黄酒地黄擇肥實大者每米一斗生地黄一斤用竹刀切略於木石臼中搗碎同米拌和上甑蒸熟依常法入醖黄精亦依此法菊花酒九月取菊花曝乾揉碎入米饙中蒸令熟醖酒如地黄法酴醾酒七月開酴醾摘取頭子去青蕚用沸湯綽過紐乾浸法酒一升經宿漉去花頭勻入九升酒内此洛中法蒲萄酒法酸米入甑蒸起上用杏仁五兩去皮尖蒲萄二斤半浴過乾去了皮與杏仁同於砂盆内一處用熟漿三斗逐旋研盡為度以生絹濾過其三斗熟漿潑飯軟蓋良乆出飯攤於案上依常法候温入麴捜拌猥酒每石糟用米一斗煑粥入正發醅一升以来拌和糟令温候一二日如蟹眼發動方入麴三斤麥糵末四兩捜拌蓋覆直候熟却將前来黄頭并折澄酒脚傾在甕中打轉上榨神仙酒法附武陵桃源酒法取神麯二十兩細剉如􅀥核大曝乾取河水一斗澄清浸待發取一斗好糯米淘三二十遍令淨以水清為度三澑炊飯令極軟爛攤冷以四時氣候消息之投入麯汁中熟攪令似爛粥候發即更炊二斗米依前法更酘二斗嘗之其味或不似酒味勿怪之候發又炊二斗米投之候發更酘三斗待冷依前投之其酒即成四酘通用米一石如天氣稍冷即煖和熟後三五日甕頭有澄清者先取飲之蠲除萬病令人輕健縱令酣酌無傷此本於武陵桃源中得之乆服延年益夀後被齊民要術中採綴編錄時人縱傳之皆失其妙此方盡桃源中眞傳也今商量以空水浸麯未為妙每造一斗米先取一合以水煑取一升澄取清汁浸麯待發經一日炊飯候冷即出甕中以麯水熟和還入甕内每酘皆如此其第三以一斗為率初用一合米浸麴一酘一升二三四酘皆二升五酘三升是止九升一合第五皆待酒發後經一日酘之五酘畢待發定訖更一兩日然後可壓漉即滓大半化為酒如味硬即每一斗酒蒸三斗糯米取大麥麴糵一大匙神麯末一大分熟攪和盛葛袋中内入酒瓶候甘美即去却袋凡造諸色酒北地寒即如人氣酘之南中氣暖即須至冷為佳不然則錯矣已北造徃往不發緣地寒故也雖料理得發味終不堪但密泥頭經春暖後即一甕自成美酒矣眞人變鬚髮方糯米二斗淨簸擇不得令有雜米地黄二斗其地黄先淨洗􅇋水脉盡以竹刀切如豆顆大勃堆疊二斗不可犯鐡母薑四斤生用以生布巾楷之去皮須見肉細切秤之法麴二斤若常麯四斤搗為末右取糯米以清水淘令凈一依常法炊之良乆即不饙入地黄生薑相重炊待熟便置於盆中熟攪如粥候冷即入麴末置於通􅀈磁瓶甕中醖造密泥頭更不得動夏三十日秋冬四十日每饑即飲常服尤妙妙理麴法白麵不計多少先淨洗辣蓼爛搗以新布絞取汁以新刷箒灑於麵中勿冷大濕但只踏得就為度候踏實每個以紙袋挂風中一月後方可取日中曝三日然後收用時中麴法每菉豆一斗揀淨水淘候水清浸一宿蒸豆極爛攤在案上候冷用白麯十五斤辣蓼末一升蓼曝乾搗為末須旱地上生者極辣豆麯大斗用大秤省斗用省秤將豆麯辣蓼一處拌勻入臼内搗極相乳入如乾入少蒸豆水不可太乾不可太濕如乾麥飯為度用布包踏成圓麯中心畱一眼要索穿以麥稈穰草罨一十日先用穰草鋪在地上及用穰草繫成束排成間起麴令懸空取出以索穿當風懸掛不可見日一月方乾用時每斗用麯四兩須搗成末焙乾用冷泉酒法每糯米五斗先取五升淘淨蒸飯次將四斗五升米淘淨入甕内用稍箕盛蒸飯五升坐在生米上入水五斗浸之候漿酸飯浮約一两日取出用麴五兩拌和勻先入甕底次取所浸米四斗五升控乾蒸飯軟硬得所攤令極冷用麴末十五兩取浸漿每斗米用五升拌飯與麴令極勻不令成塊按令面平罨浮飯在底不可攪拌以麴少許糝面用盆蓋甕口紙封口縫兩重再用泥封紙縫勿令透氣夏五日春秋七八日北山酒經卷下
