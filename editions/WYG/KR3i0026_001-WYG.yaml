  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0026_WYG_001-1a, image: WYG0844/WYG0844-0814c.png}
body:
  text: 北山酒經卷上宋朱翼中撰酒之作尚矣儀狄作酒醪杜康秫酒豈以善釀得名蓋抑始於此耶酒味甘辛大熱有毒雖可忘憂然能作疾所謂腐腸爛胃潰髓蒸筋而劉訓養生論酒所以醉人者麴糵氣之故爾麴蘖氣消皆化為水昔先王誥庶邦庶士無彞酒又曰祀兹酒言天之命民作酒惟祀而已六彞有舟所以戒其覆六尊有罍所以戒其淫陶侃劇飲亦自制其限後世以酒為漿不醉反恥豈知百藥之長黄帝所以治疾耶大率晉人嗜酒孔羣作書族人今年秫得七百斛不了麴糵事王忱三日不飲酒覺形神不復相親至於劉殷嵇阮之徒尤不可一日無此要之酣放自肆託於麴糵以逃世網未必眞得酒中趣爾古之所謂得全於酒者正不如此是知狂藥自有妙理豈特澆其胸中之礧磈者耶五斗先生棄官而歸耕於東皋之野浪遊醉鄉沒身不返以謂結繩之政已薄矣雖黄帝蕐胥之遊殆未有以過之由此觀之酒之境界豈餔歠者所能與知哉儒學之士如韓愈者猶不足以知此反悲醉鄉之徒為不遇大哉酒之於世也禮天地事鬼神射鄉之飲鹿鳴之歌賔主百拜左右秩秩上至縉紳下逮閭里詩人墨客漁夫樵婦無一可以缺此投閒自放攘襟露腹便然酣卧於江湖之上扶頭解酲忽然而醒雖道術之士鍊陽消隂饑腸如筋而熟榖之液亦不能去惟胡人禪律以此為戒嗜者至於濡首敗性失理傷生往往屏爵棄巵焚罍折榼終身不復知其味者酒復何過耶平居無事汙罇斗酒發狂蕩之思助江山之興亦未足以知麴糵之力稻米之功至於流離放逐秋聲暮雨朝登糟丘墓遊麴封禦魑魅於烟嵐轉炎荒為淨土酒之功力其近於道耶與酒遊者死生驚懼交於前而不知其視窮泰違順特戲事爾彼饑餓其身焦勞其思牛衣發兒女之感澤畔有可憐之色又烏足以議此哉鴟夷大人以酒為名含垢受侮與世浮沈而彼騷人髙自標持分别黒白且不足於全身遠害猶以為惟我獨醒善乎酒之移人也慘舒隂陽平治險阻剛愎者薫然而慈仁懦弱者感慨而激烈陵轢王公紿玩妻妾滑稽不窮斟酌自如識量之髙風味之媺足以還澆薄而發猥瑣豈特此哉夙夜在公駜有豈樂飲酒魚藻酌以大斗行葦不醉無歸湛露君臣相遇播於聲詩亦未足以語太平之盛至於黎民休息日用飲食祝史無求神具醉止斯可謂至徳之世矣然則伯倫之頌徳樂天之論功蓋未必有以形容之夫其道深逺非冥捜不足以發其義其術精微非三昧不足以善其事昔唐逸人追述焦革酒法立祠配享又采自古以来善酒者以為譜雖其書脱略卑陋聞者垂涎酣適之士口誦而心醉非酒之董狐其孰能為之哉昔人有齋中酒㕔事酒猥酒雖均以麴糵為之而有聖有賢清濁不同周官酒正以式法授酒材辨五齊之名三酒之物嵗中以酒式誅賞月令乃命大酋音縮大酋酒之官長也秫稲必齊麴糵必時湛饎必潔水泉必香陶器必良火齊必得六者盡善更得䤈漿則酒人之事過半矣周官漿人掌共王之六飲水漿醴凉醫酏入于酒府而漿最為先古語有之空桑穢飯醖以稷麥以成醇醪酒之始也説文酒白謂之醙醙者壞飯也醙者老也飯老即壞飯不壞則酒不甜又曰烏梅女䴷胡板切甜醹九酘澄清百品酒之終也麴之於黍猶鉛之於汞隂陽相制變化自然春秋緯曰麥隂也黍陽也先漬麴而投黍是陽得隂而沸後世麴有用藥者所以治疾也麴用豆亦佳神農氏赤小豆飲汁愈酒病酒有熱得豆為良但硬薄少藴藉耳古者醴酒在室醍酒在堂澄酒在下而酒以醇厚為上飲家須察黍性陳新天氣冷暖春夏及黍性新軟則先湯平聲而後米酒人謂之倒湯去聲秋冬及黍性陳硬則先米而後湯酒人謂之正湯醖釀須酴米偷酸説文酴酒母也酴音途酘醹偷甜淛人不善偷酸所以酒熟入灰北人不善偷甜所以飲多令人膈上懊憹桓公所謂青州從事平原督郵者此也酒甘易釀味辛難醖釋名酒者酉也酉者隂中也酉用事而為收收者甘也卯用事而為散散者辛也酒之名以甘辛為義金木間隔以土為媒自酸之甘自甘之辛而酒成焉酴米所以要酸酘醹所以要甜所謂以土之甘合水作酸以木之酸合土作辛然後知酘者所以作辛也説文酘者再釀也張蕐有九醖酒齊民要術桑落酒有六七酘者酒以酘多為善要在麴力相反䤖酒所以有韻者亦以其再酘故也過度亦多術尤忌見日若太陽出即酒多不中後魏賈思勰亦以夜半蒸炊昧旦下釀所謂以隂制陽其義如此著水無多少拌和黍麥以勻為度張籍詩釀酒愛乾和即今人不入定酒也晉人謂之乾榨酒大抵用水隨其湯去聲黍之大小斟酌之若酘多水寛亦不妨要之米力勝於麴麴力勝於水即善矣北人不用酵秪用刷案水謂之信水然信水非酵也酒人以此體候冷暖爾凡醖不用酵即酒難發醅来遲則脚不正秪用正發酒醅最良不然則掉取醅面絞令稍乾和以麴糵掛於衡茅謂之乾酵用酵四時不同寒即多用温即減之酒人冬月用酵𦂳用麴少夏月用麴多用酵緩天氣極熱置甕於深屋冬月温室多用氊毯圍遶之語林云抱甕冬醪言冬月釀酒令人抱甕速成而味好大抵冬月葢覆即陽氣在内而酒不凍夏月閉藏即隂氣在内而酒不動非深得卯酉出入之義孰能知此哉於戲酒之梗槩曲盡於此若夫心手之用不傳文字固有父子一法而氣味不同一手自釀而色澤殊絶此雖酒人亦不能自知也北山酒經卷上
