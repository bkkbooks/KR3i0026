body:
  text: 北山酒經譜録類二飲饌之屬提要臣等謹案北山酒經三卷宋朱翼中撰陳振孫書録解題但稱為大隱翁撰而不詳其姓氏考宋李保有續北山酒經與此書並載陶宗儀説郛保自敘云大隱先生朱翼中著書釀酒僑居湖上朝廷大興醫學起為博士坐書東坡詩貶達州則大隱固翼中之自號也是編首卷為總論二三卷載製麴造酒之法頗詳宋史藝文志作一卷蓋傳刻之誤説郛所采僅總論一篇餘皆有録無書則此固為完本矣明焦竑原序稱于田氏留青日札中考得作者姓名似未見李保序者而程百二又取保序冠于此書之前標曰題北山酒經後亦為乖誤卷末有袁宏道觴政十六則王績醉鄉記一篇蓋胡之衍所附入然古來著述言酒事者多矣附録一明人一唐人何所取義今併刋除焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ed96856132b24c852560fba42757678872aa16f3c6bddc9f927f21de2a74a89b
