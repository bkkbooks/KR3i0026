  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0026_WYG_002-1a, image: WYG0844/WYG0844-0817c.png}
body:
  text: 北山酒經卷中宋朱翼中撰頓遞祠發麴香泉麴香桂麴杏仁麴已上罨麴罨今人云􅝛瑤泉麴金波麴滑臺麴豆花麴已上風麴玉友麴䤖酒麴白醪麴真一麴已上小麴總論凡法麴於六月三伏中踏造先造峭汁每甕用甜水三石五斗蒼耳一百斤蛇麻辣蓼各二十斤銼碎爛搗入甕內日煎五七日天隂至十日用盆蓋覆每日用杷子攪兩次濾去滓以和麵此法本為造麴多處設要之不若取自然汁為佳若秪造三五百斤麵取上三物爛搗入井花水裂取自然汁則酒味辛辣內法酒庫杏仁麴止是用杏仁研取汁即酒味醇甜麴用香藥大抵辛香發散而已每片可重一斤四兩乾時可得一斤直須實踏若虛則不中造麴水多則糖心水脈不勻則心內青黑色傷熱則心紅傷冷則發不透而體重惟是體輕心內黃白或上面有花衣乃是好麴自踏造日為始約一月餘日出場子且於當風處井欄垜起更候十餘日打開心內無濕處方於日中曝乾候冷乃收之收麴要髙燥處不得近地氣及隂潤屋舍盛貯仍防蟲鼠穢汚四十九日後方可用頓遞祠祭麴小麥一石磨白麵六十斤分作兩栲栳使道人頭蛇麻花水共七升拌和似麥飯入下項藥白术一兩半川芎一兩白附子半兩瓜蒂一箇木香一錢半已上藥搗羅為細末勻在六十斤麵內道人頭十六斤蛇麻八斤一名辣母藤已上草揀擇銼碎爛搗用大盆盛新汲水浸攪拌似藍澱水濃為度秪收一斗四升將前麵拌和令勻右件藥麵拌時須乾濕得所不可貪水握得聚撲得散是其訣也便用粗篩隔過所貴不作塊按令實用厚復蓋之令暖三四時辰水脈勻或經宿夜氣留潤亦佳方入模子用布包裹實踏仍預治淨室無風處安排下場子先用板槅地氣下鋪麥􅂒約一尺浮上鋪箔箔上鋪麴看遠近用草人子為栔音至上用麥􅂒蓋之又鋪箔箔上又鋪麴依前鋪麥􅂒四面用麥􅂒劄實風道上面更以黃蒿稀壓定須一日兩次覷步體當發得緊慢傷熱則心紅傷冷則體重若發得熱周遭麥􅂒微濕則減去上面蓋者麥􅂒并取去四面劄塞令透風氣約三兩時辰或半日許依前蓋覆若發得大熱即再蓋減麥􅂒令薄如冷不發即添麥􅂒厚蓋催趂之約發及十餘日已來將側起兩兩相對再如前罨之蘸瓦日足然後出草去聲立曰蘸側曰瓦香泉麴白麵一百斤分作三分共使下項藥川芎七兩白附子五錢白术三兩半瓜蒂二錢已上藥共搗羅為末用馬尾羅篩過亦分作三分與前項麵一處拌和令勻每一分用井水八升其踏罨與頓遞祠祭法同香桂麴每麵一百斤分作五處木香一兩官桂一兩防風一兩道人頭一兩白术一兩杏仁一兩去皮尖細研右件為末將藥亦分作五處持入麵中次用蒼耳二十斤蛇麻一十五斤擇淨銼碎入石臼搗爛入新汲井水二斗一處揉如藍相似取汁二斗四升每一分使汁四升七合竹􅀢落內一處拌和其踏罨與頓遞祠祭法同杏仁麴每麴一百斤使杏仁十二兩去皮尖湯浸於砂盆內研爛如乳酪相似用冷熟水二斗四升浸杏仁為汁分作五處拌麵其踏罨如頓遞祠祭法同已上罨麴瑤泉麴白麵六十斤上甑蒸糯米粉四十斤一斗米粉稱得六斤半已上粉麵先拌令勻次入下項藥白术一兩防風五錢白附子五錢官桂二兩瓜蒂一分檳榔五錢胡椒一兩桂花五錢丁香五錢人參一兩天南星五錢茯苓一兩香白芷一兩川芎一兩肉豆蔲一兩右件藥並為細末與粉麵拌和乾再入杏仁三斤去皮尖磨細入井花水一斗八升調勻旋灑於前項粉麵內拌勻復用粗篩隔過實踏用桑葉裹盛於紙袋中用繩繫定即時挂起不得積下仍單行懸之二七日去桑葉秪是紙袋兩月可收金波麴木香三兩川芎六兩白术九兩白附子半斤官桂七兩防風二兩黑附子二兩炮去皮瓜蒂五錢右件藥都搗羅為末每料用糯米粉白麵共三百斤使上件藥拌和令勻更用杏仁一斤去皮尖入砂盆內爛研濾去滓然後用水蓼一斤道人頭半斤蛇麻一斤同搗爛以新汲水五斗揉取濃汁和搜入盆內以手拌勻於淨席上堆放如法蓋覆一宿次日早辰用模踏造堆實為妙踏成用榖葉裹盛內在紙袋中挂閣透風處半月去榖葉秪置於紙袋中兩月方可用滑臺麴白麵一百斤糯米粉一百斤已上粉麵先拌和令勻次入下項藥白术四兩官桂二兩胡椒二兩川芎二兩白芷二兩天南星二兩瓜蒂五錢杏仁二斤用溫湯浸去皮尖更冷水淘三兩遍入砂盆內研旋入井花水取濃汁二斗右件搗羅為細末將粉麵并藥一處拌和令勻然後將杏仁汁旋灑於前項粉麵內拌揉亦須乾濕得所握得聚撲得散即用粗篩隔過於淨席上堆放如法蓋三四時辰候水脈勻入模子內實踏用刀子分為四片逐片印風字訖用紙袋子包裹挂無日透風處四十九日踏下便入紙袋盛挂起不得積下挂時相離著不得厮沓恐熱不透風每一石米用麴一百二十兩隔年陳麴有力秪可使十兩豆花麴白麵五斗赤豆七升杏仁三兩川烏頭三兩官桂二兩麥糵四兩焙乾右除頭麵外並為細末却用蒼耳辣蓼勒母藤三味各一大握搗取濃汁浸豆一伏時漉出豆蒸以糜爛為度豆須是煮爛成沙控乾放冷方堪用若煮不爛即造酒出有豆腥氣却將浸豆汁煎數沸别頓放候蒸豆熟於冷搜和白麵并藥末硬軟得所帶軟為佳如硬更入少浸豆汁緊踏作片子秪用紙裹以麻皮寬縛定挂透風處四十日取出曝乾即可用須先露五七夜後七八月以後方可使每斗用六兩隔年者用四兩此麴謂之錯著水李都尉玉漿乃用此麴但不用蒼耳辣蓼勒母藤三種耳又一法只用三種草汁浸米一夕搗粉每斗爛煮赤豆三升入白麵九斤拌和踏桑葉裹入紙袋當風挂之即不用香藥耳已上風麴玉友麴上撒米裝甜米比醋麋鬆利易炊候裝徹氣上用木箆炊帚掠撥甑周回生米在氣上緊處掠撥平整候氣勻溜用箆翻攪再溜氣勻用湯潑之謂之小潑再候氣勻用箆翻攪候米勻熟又用湯潑謂之大潑復用木箆攪幹隨箆潑湯後勻軟稀稠得所取出盆內以湯微灑以一器蓋之候滲盡出在案上翻稍三兩遍放令極冷四時並同其潑澑盤棹並同蒸腳麋法惟是不犯漿秪用蔥椒油麵比前減半同煎白湯潑之每斗不過潑二升拍擊米心勻破成麋亦如上法酘醹酘醹最要厮應不可過不可不及腳熱發緊不分摘開發過無力方酘非特酒味薄不醇美兼麴末少咬甜麋不住頭腳不厮應多致味酸若腳嫩力小酘早甜麋冷不能發脫折斷多致涎慢酒人謂之攧了須是發緊迎甜便酘寒時四六酘溫涼時中停酘熱時三七酘醞法總論天暖時二分為腳一分酘天寒時中停酘如極寒時一分為腳二分酘大熱或更不酘一法秪看醅腳緊慢加減酘亦治法也若醅腳發得恰好即用甜飯依數酘之若用黃米造酒秪以醋麋一半酘之謂之腳搭腳如此醖造暖時尤穩若發得大緊恐酒味大辣即添入米一二斗若發得大慢恐酒味甜即添入麴三四斤定酒味全在此時也四時並須放冷齊民要術所以專取桑落時造者黍必冷極冷故也酘飯極冷即酒味方辣所偷甜也酘飯寒時爛揉溫涼不須令爛熱時秪可拌和停勻恐傷人氣北人秋冬酘飯秪取腳醅一半於案上共酘飯一處辣蓼勒母藤蒼耳各二斤青蒿桑葉各減半並取近上稍嫩者用石臼搗爛布絞取自然汁更以杏仁百粒去皮尖細研入汁內先將糯米揀簸一斗急淘淨控極乾為細粉更曝令乾以藥汁逐旋勻灑拌和乾濕得所乾濕不可過以意量度摶成餅子以舊麴末逐個為衣各排在篩子內於不透風處淨室內先鋪乾草一方用青蒿鋪蓋厚三寸許安篩子在上更以草厚四寸許覆之覆時須勻不可令有厚薄一兩日間不住以手探之候餅子上稍熱仍有白衣即去覆者草明日取出通風處安棹子上須稍乾旋旋逐個揭之令離篩子更數日以籃子懸通風處一月可用罨餅子須熱透又不可過候此為最難未乾見日即裂夏月造易蛀惟八月造可􅊀一秋及來春之用四月至九月可釀九月後寒即不發白醪麴粳米三升糯米一升淨淘洗為細粉川芎一兩峽椒一兩為末麴母末一兩與米粉藥末等拌勻桑葉一把蒼耳葉一把蓼葉一束右爛搗入新汲水破令得所濾汁拌米粉無令濕捻成團須是緊實更以麴母遍身糝過為衣以榖樹葉鋪底仍蓋一宿候白衣上更候五七日晒乾以籃盛挂風頭每斗三兩過半年以後即使二兩半小酒麴每糯米一斗作粉用蓼汁和勻次入肉桂木香甘草杏仁川烏頭川芎生薑與杏仁同研汁各用一分作餅子用穰草蓋勿令見風熱透後番依玉友罨法出場當風懸之每造酒一斗用四兩真一麴此東坡法也上等白麵一斗以生薑五兩研取汁揉和依常法起酵作蒸餅切作片子挂透風處一月輕乾可用蓮子麴糯米二斗淘淨少時蒸飯攤了先用麵三斗細切生薑半斤如豆大和麵微炒令黃放冷隔宿亦攤之候飯溫拌令勻勿令作塊放蘆席上攤以蒿草罨作黃子勿令黃子黑但白衣上即去草番轉更半日將日影中晒乾入紙袋盛挂在梁上風吹已上䤖麴北山酒經卷中
